<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lieferkarte Karlsruhe – Restaurants mit eigenem Lieferservice</title>
  <meta name="description" content="Restaurants in Karlsruhe mit eigenem Lieferservice – direkt bestellen, ohne Provisions-Plattformen. Keine Cookies, kein Tracking.">

  <!-- Leaflet (Kartenbibliothek, BSD-2-Clause) -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --accent: #d64541;
      --text: #1e1e1e;
      --muted: #6b6b6b;
      --ok: #2e8b4f;
      --border: #e3e3df;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      flex: 0 0 auto;
    }
    header h1 {
      font-size: 1.15rem;
      margin: 0 0 0.15rem;
    }
    header h1 .accent { color: var(--accent); }
    header .sub { font-size: 0.8rem; color: var(--muted); }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.5rem;
    }
    .controls input[type="search"] {
      flex: 1 1 200px;
      min-width: 140px;
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .controls label {
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
    }
    .controls button {
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .controls button:hover { background: #f0f0ee; }
    .controls .count { font-size: 0.85rem; color: var(--muted); margin-left: auto; }
    #map { flex: 1 1 auto; }
    .popup-name { font-weight: 600; font-size: 1rem; margin-bottom: 0.15rem; }
    .popup-addr { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.4rem; }
    .popup-hours {
      font-size: 0.82rem;
      color: var(--text);
      margin-top: 0.45rem;
      line-height: 1.35;
    }
    .popup-hours .label { color: var(--muted); display: block; margin-bottom: 0.25rem; }
    /* Zwei Spalten: Tage links, Zeiten rechts – eine Zeile pro Regel. */
    .hours-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      column-gap: 0.6rem;
      row-gap: 0.15rem;
    }
    .hours-grid .day { color: var(--muted); white-space: nowrap; }
    .hours-grid .time { font-variant-numeric: tabular-nums; }
    .hours-grid .time.closed { color: var(--accent); }
    .badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-right: 0.3rem;
    }
    .badge-delivery { background: #e6f4ea; color: var(--ok); }
    .badge-nodelivery { background: #f4e6e6; color: var(--accent); }
    .badge-takeaway { background: #e7eefc; color: #2b5bb5; }
    .badge-status { background: #fff3cd; color: #856404; }
    .badge-open { background: #e6f4ea; color: var(--ok); }
    .badge-closed { background: #f4e6e6; color: var(--accent); }
    .popup-link {
      display: inline-block;
      margin-top: 0.4rem;
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    .popup-link:hover { text-decoration: underline; }
    .meld { margin-top: 0.5rem; }
    .meld summary {
      cursor: pointer;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
    }
    .meld-body { margin-top: 0.4rem; }
    .meld-text {
      font-size: 0.8rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.5rem;
      margin: 0 0 0.4rem;
    }
    .meld-hint { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; }
    footer {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 0.4rem 1rem;
      font-size: 0.72rem;
      color: var(--muted);
      flex: 0 0 auto;
    }
    footer a { color: var(--muted); }
    .loading {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-size: 0.95rem; color: var(--muted);
      z-index: 500; pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>🍽️ Lieferkarte <span class="accent">Karlsruhe</span></h1>
    <div class="sub" id="meta">Restaurants mit eigenem Lieferservice – direkt bestellen, ohne Provisions-Plattformen.</div>
    <div class="controls">
      <input type="search" id="search" placeholder="Restaurant oder Adresse suchen …" autocomplete="off">
      <label><input type="checkbox" id="onlyDelivery" checked> nur mit Lieferservice</label>
      <label><input type="checkbox" id="onlyOpen"> nur jetzt geöffnet</label>
      <button id="nearMe" type="button">📍 In meiner Nähe</button>
      <span class="count" id="count"></span>
    </div>
  </header>

  <div id="map">
    <div class="loading" id="loading">Lade Restaurants …</div>
  </div>

  <footer>
    Daten &amp; Karte: © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>-Mitwirkende (ODbL) ·
    Keine Cookies, kein Tracking · <a href="datenschutz.html" target="_blank" rel="noopener">Datenschutz &amp; Hinweise</a>
  </footer>

  <script>
    const KA = [49.0069, 8.4037];

    const map = L.map("map", { zoomControl: true }).setView(KA, 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap-Mitwirkende",
    }).addTo(map);

    const layer = L.layerGroup().addTo(map);
    let restaurants = [];
    let meMarker = null;

    const $search = document.getElementById("search");
    const $onlyDelivery = document.getElementById("onlyDelivery");
    const $onlyOpen = document.getElementById("onlyOpen");
    const $count = document.getElementById("count");
    const $meta = document.getElementById("meta");
    const $loading = document.getElementById("loading");

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    // OSM-Wochentags-/Sonderkürzel -> deutsche Kürzel.
    const OSM_DAYS = {
      Mo: "Mo", Tu: "Di", We: "Mi", Th: "Do", Fr: "Fr", Sa: "Sa", Su: "So",
      PH: "Feiertags", SH: "Ferien"
    };
    const DAY_TOKEN = "Mo|Tu|We|Th|Fr|Sa|Su|PH|SH";
    // Eine Regel: Tages-Spec (Bereiche/Listen) + Rest bis zur nächsten Regel.
    // Regelgrenze = ";" oder "," direkt vor einem neuen Tageskürzel; Kommas
    // innerhalb von Tages- ("Fr,Sa") oder Zeitlisten ("11:00-14:00,17:00-…")
    // lösen keine Trennung aus, weil ihnen kein Tageskürzel folgt.
    const RULE_RE = new RegExp(
      "((?:" + DAY_TOKEN + ")(?:\\s*[-,]\\s*(?:" + DAY_TOKEN + "))*)" +  // Tage
      "\\s+([^;]+?)" +                                                    // Zeiten (lazy)
      "(?=\\s*[;,]\\s*(?:" + DAY_TOKEN + ")\\b|\\s*$)",                   // bis nächste Regel/Ende
      "g"
    );

    function germanizeDays(days) {
      // "Mo-Fr" -> "Mo–Fr", "Fr,Sa" -> "Fr, Sa", "So,PH" -> "So, Feiertags".
      return days
        .split(",").map(seg => seg.trim().split("-").map(d => OSM_DAYS[d] || d).join("–"))
        .join(", ");
    }
    function germanizeTimes(times) {
      const t = times.trim();
      if (/^(off|closed)$/i.test(t)) return { text: "geschlossen", closed: true };
      // "11:00-14:00,17:00-23:00" -> "11:00–14:00, 17:00–23:00".
      const text = t.split(",").map(seg => seg.trim().replace(/-/g, "–")).join(", ");
      return { text, closed: false };
    }

    // Rohes OSM-`opening_hours` in eine übersichtliche Tag/Zeit-Tabelle wandeln.
    // Bewusst KEINE "jetzt geöffnet"-Auswertung – das komplexe Parsen des Formats
    // (sunrise/sunset, Wochenregeln) ist ein eigener Schritt.
    function formatOpeningHours(raw) {
      // Umschließende Anführungszeichen/Whitespace aus unsauberen OSM-Werten entfernen.
      const s = String(raw).replace(/^["'\s]+|["'\s]+$/g, "");
      if (!s) return "";
      if (s === "24/7") {
        return `<div class="hours-grid"><span class="day">täglich</span>` +
               `<span class="time">durchgehend geöffnet</span></div>`;
      }
      // Ganzer Wert = geschlossen (z. B. "closed"/"off"), ohne Tagesangabe.
      if (/^(off|closed)$/i.test(s)) {
        return `<div class="hours-grid"><span class="day">zurzeit</span>` +
               `<span class="time closed">geschlossen</span></div>`;
      }
      const rows = [];
      let m;
      RULE_RE.lastIndex = 0;
      while ((m = RULE_RE.exec(s)) !== null) {
        const time = germanizeTimes(m[2]);
        rows.push(
          `<span class="day">${esc(germanizeDays(m[1]))}</span>` +
          `<span class="time${time.closed ? " closed" : ""}">${esc(time.text)}</span>`
        );
      }
      // Unerwartetes Format (z. B. Freitext „nach Vereinbarung", nur Uhrzeit):
      // lieber den Rohtext zeigen als nichts – mit leichter Kosmetik (dt. Kürzel,
      // Gedankenstrich), aber ohne zu interpretieren.
      if (!rows.length) {
        let p = esc(s).replace(/\b(Mo|Tu|We|Th|Fr|Sa|Su|PH|SH)\b/g, d => OSM_DAYS[d]);
        p = p.replace(/(\d{1,2}:\d{2})-(\d{1,2}:\d{2})/g, "$1–$2");
        return `<div class="hours-grid"><span class="day"></span><span class="time">${p}</span></div>`;
      }
      return `<div class="hours-grid">${rows.join("")}</div>`;
    }

    // ---- „Jetzt geöffnet" – clientseitige Auswertung von opening_hours ----
    // Bewusst konservativ: nur die häufigen Muster (Tagesbereiche/-listen,
    // Zeitintervalle, Über-Mitternacht, "off"/"closed", 24/7). Alles Unsichere
    // – offene Zeiten wie „18:30+", Monatsbereiche („May-Sep"), Freitext,
    // sunrise/sunset – ergibt bewusst `null` = „unbekannt", damit nie eine
    // falsche Aussage entsteht. Feiertage/Ferien (PH/SH) werden ignoriert
    // (ob heute Feiertag ist, lässt sich clientseitig nicht ermitteln).
    const DAY_NUM = { Mo: 1, Tu: 2, We: 3, Th: 4, Fr: 5, Sa: 6, Su: 7 };

    // Aktuelle Zeit in Europe/Berlin – unabhängig von der Zeitzone des Nutzers
    // und inkl. korrekter Sommer-/Winterzeit (über Intl). day: 1=Mo … 7=So.
    function berlinNow() {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "Europe/Berlin", weekday: "short",
        hour: "2-digit", minute: "2-digit", hour12: false,
      }).formatToParts(new Date());
      const p = {};
      for (const part of parts) p[part.type] = part.value;
      const WD = { Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6, Sun: 7 };
      const day = WD[p.weekday] || null;
      let hh = parseInt(p.hour, 10);
      if (hh === 24) hh = 0;
      return { day, minutes: hh * 60 + parseInt(p.minute, 10) };
    }

    function parseHM(t) {
      const m = /^(\d{1,2}):(\d{2})$/.exec(t.trim());
      if (!m) return null;
      const h = +m[1], mi = +m[2];
      if (h > 24 || mi > 59) return null;
      return h * 60 + mi;
    }

    // Tages-Spec ("Mo-Fr,Su") -> Set{1..7}; "skip" wenn nur PH/SH; null bei Unbekanntem.
    function expandDays(spec) {
      const set = new Set();
      let sawReal = false;
      for (const seg of spec.split(",")) {
        const s = seg.trim();
        if (!s) continue;
        if (/^(PH|SH)$/.test(s)) continue; // Feiertag/Ferien -> nicht ermittelbar
        sawReal = true;
        const r = s.split("-").map(x => x.trim());
        if (r.length === 1) {
          const n = DAY_NUM[r[0]];
          if (!n) return null;
          set.add(n);
        } else if (r.length === 2) {
          const a = DAY_NUM[r[0]], b = DAY_NUM[r[1]];
          if (!a || !b) return null;
          let i = a; // ggf. über Sonntag hinweg (z. B. "We-Mo")
          for (let guard = 0; guard < 7; guard++) {
            set.add(i);
            if (i === b) break;
            i = (i % 7) + 1;
          }
        } else return null;
      }
      return sawReal ? set : "skip";
    }

    // Zeit-Spec ("12:00-14:00,18:00-23:00") -> [{s,e}]; "off"/"closed" -> [];
    // null bei allem Unklaren (offene Zeiten "18:30+", sunrise, …).
    // Ein einzelner Bereich darf einen angehängten Modifikator tragen:
    // "17:30-22:00 off"/"…closed" -> dieser Bereich geschlossen (fällt raus),
    // "…open" -> offen. Ein eingebetteter Freitext-Kommentar ("…") ist bewusst
    // NICHT abgedeckt -> solche Einträge bleiben „unbekannt" (kein Badge).
    function parseIntervals(spec) {
      const t = spec.trim();
      if (/^(off|closed)$/i.test(t)) return []; // an diesem Tag geschlossen
      const out = [];
      let sawSegment = false;
      for (const seg of t.split(",")) {
        const s = seg.trim();
        if (!s) continue;
        sawSegment = true;
        const m = /^(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})(?:\s+(off|closed|open))?$/i.exec(s);
        if (!m) return null;
        if (/^(off|closed)$/i.test(m[3] || "")) continue; // Bereich explizit geschlossen
        const a = parseHM(m[1]), b = parseHM(m[2]);
        if (a == null || b == null) return null;
        out.push({ s: a, e: b });
      }
      // Bereiche erkannt (auch wenn alle "off" waren -> [] = geschlossen)?
      return sawSegment ? out : null;
    }

    // -> true (offen) | false (geschlossen) | null (unbekannt/nicht auswertbar).
    function openStateNow(raw) {
      const s = String(raw).replace(/^["'\s]+|["'\s]+$/g, "");
      if (!s) return null;
      if (s === "24/7") return true;
      if (/^(off|closed)$/i.test(s)) return false;

      const byDay = {}; // 1..7 -> [{s,e}] ; spätere Regel überschreibt frühere je Tag
      const hasDay = new RegExp("\\b(?:" + DAY_TOKEN + ")\\b").test(s);

      if (!hasDay) {
        // Kein Tageskürzel -> Zeitangabe gilt täglich.
        const iv = parseIntervals(s);
        if (iv == null) return null;
        for (let d = 1; d <= 7; d++) byDay[d] = iv;
      } else {
        const covered = new Array(s.length).fill(false);
        let any = false, m;
        RULE_RE.lastIndex = 0;
        while ((m = RULE_RE.exec(s)) !== null) {
          any = true;
          for (let i = m.index; i < m.index + m[0].length; i++) covered[i] = true;
          const days = expandDays(m[1]);
          if (days === null) return null;
          const iv = parseIntervals(m[2]);
          if (iv === null) return null;
          if (days === "skip") continue; // reine PH/SH-Regel
          for (const d of days) byDay[d] = iv;
        }
        if (!any) return null;
        // Bleibt zwischen den erkannten Regeln noch etwas Bedeutungstragendes übrig
        // (Ziffern, ein Tageskürzel, off/closed)? Dann lieber „unbekannt" melden,
        // statt aus einer Teil-Interpretation eine falsche Aussage abzuleiten.
        let rest = "";
        for (let i = 0; i < s.length; i++) if (!covered[i]) rest += s[i];
        if (/\d/.test(rest) || /off|closed/i.test(rest) ||
            new RegExp("\\b(?:" + DAY_TOKEN + ")\\b").test(rest)) return null;
      }

      const { day, minutes } = berlinNow();
      if (!day) return null;
      const prev = (day + 5) % 7 + 1; // Vortag (1..7)

      const openToday = (byDay[day] || []).some(({ s, e }) =>
        e > s ? (minutes >= s && minutes < e)  // normaler Bereich
              : (minutes >= s));               // über Mitternacht: ab s bis 24:00
      if (openToday) return true;

      // Über-Mitternacht-Ausläufer vom Vortag (z. B. Fr 20:00-04:00 -> Sa 02:00 offen).
      const spillover = (byDay[prev] || []).some(({ s, e }) => e < s && minutes < e);
      return spillover ? true : false;
    }

    // Baut einen fertigen Meldetext für eine OSM-Notiz.
    // Nennt den aktuell getaggten Ist-Wert, damit die Notiz sofort brauchbar ist.
    function meldeText(r) {
      const ist = [];
      if (r.delivery === true) ist.push("Lieferung (delivery) ist als „ja“ getaggt");
      else if (r.delivery === false) ist.push("Lieferung (delivery) ist als „nein“ getaggt");
      if (r.takeaway === true) ist.push("Abholung (takeaway) ist als „ja“ getaggt");
      else if (r.takeaway === false) ist.push("Abholung (takeaway) ist als „nein“ getaggt");

      const adr = r.address ? ", " + r.address : "";
      let t = `Lieferkarte Karlsruhe – mögliche falsche Angabe bei „${r.name}“${adr}. `;
      if (ist.length) t += "Aktuell: " + ist.join("; ") + ". ";
      t += "Nach meiner Kenntnis stimmt das nicht – bitte den korrekten Wert prüfen und eintragen. Danke!";
      return t;
    }

    // OSM-Notiz-Editor, punktgenau auf das Restaurant zentriert (kein Konto nötig).
    function osmNoteUrl(r) {
      return `https://www.openstreetmap.org/note/new#map=19/${r.lat}/${r.lng}&layers=N`;
    }

    function popupHtml(r) {
      let html = `<div class="popup-name">${esc(r.name)}</div>`;
      html += `<div class="popup-addr">${esc(r.address)}</div>`;
      if (r.delivery === true) {
        html += `<span class="badge badge-delivery">✔ Lieferservice</span>`;
      } else if (r.delivery === false) {
        html += `<span class="badge badge-nodelivery">kein Lieferservice</span>`;
      }
      if (r.takeaway === true) {
        html += `<span class="badge badge-takeaway">🥡 Abholung</span>`;
      }
      if (r.businessStatus && r.businessStatus !== "OPERATIONAL") {
        const label = r.businessStatus === "CLOSED_TEMPORARILY"
          ? "vorübergehend geschlossen" : "dauerhaft geschlossen";
        html += `<span class="badge badge-status">${label}</span>`;
      }
      // „Jetzt geöffnet"-Badge nur, wenn die Öffnungszeiten eindeutig auswertbar
      // sind (true/false). Bei unbekannt (null) bewusst kein Badge.
      const open = r.openingHours ? openStateNow(r.openingHours) : null;
      if (open === true) {
        html += `<span class="badge badge-open">🟢 Jetzt geöffnet</span>`;
      } else if (open === false) {
        html += `<span class="badge badge-closed">🔴 Jetzt geschlossen</span>`;
      }
      const hours = r.openingHours ? formatOpeningHours(r.openingHours) : "";
      if (hours) {
        html += `<div class="popup-hours"><span class="label">🕒 Öffnungszeiten:</span>${hours}</div>`;
      }
      if (r.website) {
        html += `<br><a class="popup-link" href="${esc(r.website)}" target="_blank" rel="noopener">Zur Website &amp; bestellen →</a>`;
      }

      // Meldemöglichkeit: immer anzeigen. Der Text kann per URL nicht in die
      // OSM-Notiz vorbefüllt werden, deshalb kopieren wir ihn in die Zwischenablage
      // und öffnen den Notiz-Editor – Einfügen genügt dann.
      const meldung = meldeText(r);
      html += `<details class="meld">`;
      html += `<summary>⚑ Falsche Angabe melden</summary>`;
      html += `<div class="meld-body">`;
      html += `<p class="meld-text">${esc(meldung)}</p>`;
      html += `<a class="meld-copy popup-link" href="${esc(osmNoteUrl(r))}" target="_blank" rel="noopener" data-text="${esc(meldung)}">📋 Text kopieren &amp; OSM-Notiz öffnen</a>`;
      html += `<div class="meld-hint">Der Text wird kopiert – im OSM-Fenster nur noch einfügen (Strg/⌘ + V) und absenden. Kein Konto nötig.</div>`;
      html += `</div></details>`;

      return html;
    }

    function render() {
      const q = $search.value.trim().toLowerCase();
      const onlyDelivery = $onlyDelivery.checked;
      const onlyOpen = $onlyOpen.checked;
      layer.clearLayers();
      let shown = 0;

      for (const r of restaurants) {
        if (r.lat == null || r.lng == null) continue;
        if (onlyDelivery && r.delivery !== true) continue;
        // Filter „nur jetzt geöffnet": nur sicher offene zeigen (unbekannt fällt raus).
        if (onlyOpen && !(r.openingHours && openStateNow(r.openingHours) === true)) continue;
        if (q) {
          const hay = ((r.name || "") + " " + (r.address || "")).toLowerCase();
          if (!hay.includes(q)) continue;
        }
        L.marker([r.lat, r.lng]).bindPopup(popupHtml(r)).addTo(layer);
        shown++;
      }
      $count.textContent = `${shown} von ${restaurants.length} angezeigt`;
    }

    document.getElementById("nearMe").addEventListener("click", () => {
      if (!navigator.geolocation) {
        alert("Geolocation wird von deinem Browser nicht unterstützt.");
        return;
      }
      // Position bleibt rein im Browser – wird nirgends gespeichert oder gesendet.
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const here = [pos.coords.latitude, pos.coords.longitude];
          map.setView(here, 14);
          if (meMarker) map.removeLayer(meMarker);
          meMarker = L.circleMarker(here, {
            radius: 8, color: "#d64541", fillColor: "#d64541", fillOpacity: 0.6,
          }).addTo(map).bindPopup("Dein Standort").openPopup();
        },
        () => alert("Standort konnte nicht ermittelt werden (Erlaubnis verweigert?)."),
        { enableHighAccuracy: true, timeout: 8000 }
      );
    });

    $search.addEventListener("input", render);
    $onlyDelivery.addEventListener("change", render);
    $onlyOpen.addEventListener("change", render);

    // Meldelink: Text in die Zwischenablage kopieren, dann OSM-Notiz öffnen.
    // Kein preventDefault -> der Link öffnet den OSM-Editor wie gewohnt im neuen Tab.
    // Bleibt komplett clientseitig; es wird nichts gespeichert oder gesendet.
    document.addEventListener("click", (e) => {
      const a = e.target.closest(".meld-copy");
      if (!a) return;
      const text = a.dataset.text || "";
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          a.textContent = "✔ kopiert – OSM öffnet …";
        }).catch(() => {
          // Fallback: Kopieren verweigert/nicht verfügbar – der Text steht
          // sichtbar im Popup und kann von Hand markiert werden.
        });
      }
    });

    fetch("restaurants.json", { cache: "no-store" })
      .then(res => {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(data => {
        restaurants = data.restaurants || [];
        $loading.remove();
        if (data.lastScanAt) {
          const d = new Date(data.lastScanAt);
          const when = isNaN(d) ? data.lastScanAt : d.toLocaleDateString("de-DE");
          $meta.textContent = `${data.count} Restaurants · zuletzt aktualisiert am ${when}`;
        }
        render();
      })
      .catch(err => {
        $loading.textContent = "Konnte Restaurantdaten nicht laden (" + err.message + ").";
      });
  </script>
</body>
</html>
